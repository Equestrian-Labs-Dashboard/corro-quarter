name: Quarterly Report

on:
  workflow_dispatch:
    inputs:
      quarter:
        description: 'Quarter (q1, q2, q3, q4)'
        required: true
        default: 'q1'
        type: choice
        options: [q1, q2, q3, q4]
      year:
        description: 'Year (e.g. 2026)'
        required: true
        default: '2026'

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests gspread google-auth pytz
      - name: Run quarterly report
        env:
          SHOPIFY_TOKEN_CORRO: ${{ secrets.SHOPIFY_TOKEN_CORRO }}
          GOOGLE_CREDENTIALS:  ${{ secrets.GOOGLE_CREDENTIALS }}
          SHEET_ID_QUARTER:    ${{ secrets.SHEET_ID_QUARTER }}
        run: python corro_quarter.py --quarter ${{ inputs.quarter }} --year ${{ inputs.year }}

name: Period Report

on:
  workflow_dispatch:
    inputs:
      period:
        description: 'Period type'
        required: true
        default: 'all'
        type: choice
        options: [all, quarter, month, week, ytd]
      quarter:
        description: 'Quarter (used when period = quarter)'
        required: true
        default: 'q2'
        type: choice
        options: [q1, q2, q3, q4]
      month:
        description: 'Month number 1-12 (used when period = month)'
        required: true
        default: '5'
      week:
        description: 'ISO week number 1-53 (used when period = week)'
        required: true
        default: '20'
      year:
        description: 'Final year to load. The workflow loads from 2026 up to this year when period = all.'
        required: true
        default: '2026'

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests gspread google-auth pytz

      - name: Run period report
        env:
          SHOPIFY_TOKEN_CORRO: ${{ secrets.SHOPIFY_TOKEN_CORRO }}
          GOOGLE_CREDENTIALS:  ${{ secrets.GOOGLE_CREDENTIALS }}
          SHEET_ID_QUARTER:    ${{ secrets.SHEET_ID_QUARTER }}
          INPUT_PERIOD:        ${{ inputs.period }}
          INPUT_QUARTER:       ${{ inputs.quarter }}
          INPUT_MONTH:         ${{ inputs.month }}
          INPUT_WEEK:          ${{ inputs.week }}
          INPUT_YEAR:          ${{ inputs.year }}
        shell: bash
        run: |
          set -euo pipefail

          run_one() {
            local period="$1"
            local year="$2"
            local quarter="${3:-q1}"
            local month="${4:-1}"
            local week="${5:-1}"

            echo "============================================================"
            echo "Running period=$period year=$year quarter=$quarter month=$month week=$week"
            echo "============================================================"

            python corro_period.py \
              --period "$period" \
              --quarter "$quarter" \
              --month "$month" \
              --week "$week" \
              --year "$year"
          }

          if [ "$INPUT_PERIOD" != "all" ]; then
            run_one "$INPUT_PERIOD" "$INPUT_YEAR" "$INPUT_QUARTER" "$INPUT_MONTH" "$INPUT_WEEK"
            exit 0
          fi

          START_YEAR=2026
          END_YEAR="$INPUT_YEAR"

          CURRENT_YEAR=$(date +%Y)
          CURRENT_MONTH=$(date +%-m)
          CURRENT_WEEK=$(date +%V)
          CURRENT_WEEK=$((10#$CURRENT_WEEK))

          for YEAR in $(seq "$START_YEAR" "$END_YEAR"); do
            echo "==================== Loading ALL periods for $YEAR ===================="

            # YTD for each year. Current year remains IN PROCESS inside Python.
            run_one ytd "$YEAR" q1 1 1

            # Quarters: load all closed quarters, plus current quarter when YEAR is current.
            MAX_Q=4
            if [ "$YEAR" -eq "$CURRENT_YEAR" ]; then
              if [ "$CURRENT_MONTH" -le 3 ]; then MAX_Q=1;
              elif [ "$CURRENT_MONTH" -le 6 ]; then MAX_Q=2;
              elif [ "$CURRENT_MONTH" -le 9 ]; then MAX_Q=3;
              else MAX_Q=4; fi
            elif [ "$YEAR" -gt "$CURRENT_YEAR" ]; then
              MAX_Q=0
            fi

            for QN in $(seq 1 "$MAX_Q"); do
              run_one quarter "$YEAR" "q$QN" 1 1
            done

            # Months: load closed months and current month only; skip future months.
            MAX_MONTH=12
            if [ "$YEAR" -eq "$CURRENT_YEAR" ]; then
              MAX_MONTH="$CURRENT_MONTH"
            elif [ "$YEAR" -gt "$CURRENT_YEAR" ]; then
              MAX_MONTH=0
            fi

            for MONTH in $(seq 1 "$MAX_MONTH"); do
              run_one month "$YEAR" q1 "$MONTH" 1
            done

            # Weeks: load ISO weeks up to current week for current year; all 53 for past years.
            MAX_WEEK=53
            if [ "$YEAR" -eq "$CURRENT_YEAR" ]; then
              MAX_WEEK="$CURRENT_WEEK"
            elif [ "$YEAR" -gt "$CURRENT_YEAR" ]; then
              MAX_WEEK=0
            fi

            for WEEK in $(seq 1 "$MAX_WEEK"); do
              run_one week "$YEAR" q1 1 "$WEEK"
            done
          done
